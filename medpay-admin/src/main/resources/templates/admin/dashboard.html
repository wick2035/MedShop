<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('MedPay - 仪表盘')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{admin/layout :: sidebar}"></nav>
    <main class="main-content flex-grow-1 p-4">
        <h2 class="mb-4">仪表盘</h2>

        <form class="mb-4" method="get" th:action="@{/admin/dashboard}">
            <div class="input-group" style="max-width:400px">
                <input type="text" class="form-control" name="hospitalId" placeholder="输入医院ID" th:value="${hospitalId}">
                <button class="btn btn-primary" type="submit">查询</button>
            </div>
        </form>

        <div th:if="${kpi}" class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h6>今日收入</h6>
                        <h3 th:text="'¥' + ${kpi.todayRevenue}">¥0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h6>今日订单</h6>
                        <h3 th:text="${kpi.todayOrders}">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-dark">
                    <div class="card-body">
                        <h6>今日退款</h6>
                        <h3 th:text="'¥' + ${kpi.todayRefunds}">¥0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h6>本月收入</h6>
                        <h3 th:text="'¥' + ${kpi.monthRevenue}">¥0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5>收入趋势</h5>
                <canvas id="revenueChart" height="100"></canvas>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/static/js/admin.js}"></script>
</body>
</html>
