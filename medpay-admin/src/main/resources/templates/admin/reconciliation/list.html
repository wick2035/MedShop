<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('MedPay - 对账管理')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{admin/layout :: sidebar}"></nav>
    <main class="main-content flex-grow-1 p-4">
        <h2 class="mb-4">对账管理</h2>
        <div class="mb-3">
            <button class="btn btn-primary" onclick="triggerReconciliation()">手动触发对账</button>
        </div>
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>批次号</th>
                        <th>对账日期</th>
                        <th>渠道</th>
                        <th>匹配</th>
                        <th>不匹配</th>
                        <th>系统金额</th>
                        <th>渠道金额</th>
                        <th>差异</th>
                        <th>状态</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${batches}" th:each="batch : ${batches.content}">
                        <td th:text="${batch.batchNo}"></td>
                        <td th:text="${batch.reconciliationDate}"></td>
                        <td th:text="${batch.channel}"></td>
                        <td th:text="${batch.matchedCount}"></td>
                        <td th:text="${batch.mismatchedCount}"></td>
                        <td th:text="'¥' + ${batch.systemTotalAmount}"></td>
                        <td th:text="'¥' + ${batch.channelTotalAmount}"></td>
                        <td th:text="'¥' + ${batch.differenceAmount}"></td>
                        <td><span class="badge" th:classappend="${batch.status == 'COMPLETED'} ? 'bg-success' : (${batch.status == 'EXCEPTION'} ? 'bg-danger' : 'bg-warning')" th:text="${batch.status}"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/admin.js}"></script>
</body>
</html>
