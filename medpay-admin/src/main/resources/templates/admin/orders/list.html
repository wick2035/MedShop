<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('MedPay - 订单管理')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{admin/layout :: sidebar}"></nav>
    <main class="main-content flex-grow-1 p-4">
        <h2 class="mb-4">订单管理</h2>
        <div class="card">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="searchOrderNo" placeholder="搜索订单号...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="filterStatus">
                            <option value="">全部状态</option>
                            <option value="CREATED">待支付</option>
                            <option value="PAID">已支付</option>
                            <option value="REFUNDED">已退款</option>
                            <option value="CANCELLED">已取消</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary" onclick="searchOrders()">搜索</button>
                    </div>
                </div>
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>订单号</th>
                        <th>金额</th>
                        <th>状态</th>
                        <th>支付时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="orderTableBody">
                    <tr><td colspan="5" class="text-center text-muted">请输入医院ID进行搜索</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/admin.js}"></script>
</body>
</html>
