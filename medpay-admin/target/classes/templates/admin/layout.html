<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">MedPay Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/admin.css}" rel="stylesheet">
</head>
<body>
<nav th:fragment="sidebar" class="sidebar bg-dark text-white">
    <div class="sidebar-header p-3">
        <h4><i class="bi bi-hospital"></i> MedPay</h4>
        <small class="text-muted">管理后台</small>
    </div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/admin/dashboard}">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/admin/orders}">
                <i class="bi bi-receipt"></i> 订单管理
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/admin/refunds}">
                <i class="bi bi-arrow-return-left"></i> 退款审批
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/admin/reconciliation}">
                <i class="bi bi-check2-square"></i> 对账管理
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" th:href="@{/admin/reports}">
                <i class="bi bi-bar-chart"></i> 报表中心
            </a>
        </li>
    </ul>
</nav>
</body>
</html>
