<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('MedPay - 退款审批')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{admin/layout :: sidebar}"></nav>
    <main class="main-content flex-grow-1 p-4">
        <h2 class="mb-4">退款审批</h2>
        <form class="mb-3" method="get" th:action="@{/admin/refunds}">
            <div class="input-group" style="max-width:400px">
                <input type="text" class="form-control" name="hospitalId" placeholder="输入医院ID" th:value="${hospitalId}">
                <button class="btn btn-primary" type="submit">查询</button>
            </div>
        </form>
        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>退款号</th>
                        <th>订单号</th>
                        <th>金额</th>
                        <th>原因</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${refunds}" th:each="refund : ${refunds.content}">
                        <td th:text="${refund.refundNo}"></td>
                        <td th:text="${refund.orderNo}"></td>
                        <td th:text="'¥' + ${refund.refundAmount}"></td>
                        <td th:text="${refund.refundReason}"></td>
                        <td><span class="badge" th:classappend="${refund.status == 'PENDING'} ? 'bg-warning' : (${refund.status == 'SUCCESS'} ? 'bg-success' : 'bg-secondary')" th:text="${refund.status}"></span></td>
                        <td>
                            <div th:if="${refund.status == 'PENDING'}">
                                <button class="btn btn-sm btn-success" th:onclick="'approveRefund(\'' + ${refund.id} + '\')'">批准</button>
                                <button class="btn btn-sm btn-danger" th:onclick="'rejectRefund(\'' + ${refund.id} + '\')'">拒绝</button>
                            </div>
                        </td>
                    </tr>
                    <tr th:unless="${refunds}"><td colspan="6" class="text-center text-muted">请输入医院ID查询</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/admin.js}"></script>
</body>
</html>
